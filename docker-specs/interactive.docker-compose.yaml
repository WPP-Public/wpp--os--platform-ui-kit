version: '2.2'

services:
  front-server:
    healthcheck:
      test: [ "CMD", "curl", "localhost:3000" ]
      interval: 5s
      timeout: 3s
      retries: 20
    ports:
      - "3000:3000"
    build:
      context: ../
      dockerfile: ./docker-specs/Dockerfile.e2e-example-server
    networks:
      - tests-network
  e2e-shell:
    build:
      context: ../
      dockerfile: ./docker-specs/Dockerfile.ie
    depends_on:
      front-server:
        condition: service_healthy
    environment:
      - BASE_URL=http://front-server:3000/
    networks:
      - tests-network
    stdin_open: true
    tty: true
    volumes:
      - "..:/app"

networks:
  tests-network:
    driver: bridge
