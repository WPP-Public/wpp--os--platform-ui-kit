services:
  e2e-after:
    build:
      context: ../
      dockerfile: ./docker-specs/Dockerfile.e2e-after
    environment:
      - MS_TEAMS_E2E_WEBHOOK_URL=${MS_TEAMS_E2E_WEBHOOK_URL}
      - CI_JOB_ID=${CI_JOB_ID}
      - CI_PROJECT_NAME=${CI_PROJECT_NAME}
      - CI_JOB_NAME=${CI_JOB_NAME}
      - CI_JOB_URL=${CI_JOB_URL}
      - GITLAB_USER_NAME=${GITLAB_USER_NAME}
      - UI_FRAMEWORK=${UI_FRAMEWORK}
    volumes:
      - "../test-results:/app/packages/components-library-automation/test-results"