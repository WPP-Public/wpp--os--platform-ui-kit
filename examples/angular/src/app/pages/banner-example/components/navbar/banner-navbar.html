<div class="page">
  <div class="header">
    <div class="navigation">
      <div class="navigation-bar">
        <wpp-icon-navigation-menu class="icon-nav-menu"></wpp-icon-navigation-menu>
        <img
          src="https://easydrawingguides.com/wp-content/uploads/2018/09/Impossible-Triangle-09.png"
          class="image"
          alt=""
        />
        <wpp-breadcrumb [items]="breadcrumbsItems"></wpp-breadcrumb>
      </div>
      <div class="actions-row">
        <wpp-icon-search class="icon-search"></wpp-icon-search>
        <wpp-typography type="s-midi">Help</wpp-typography>
        <wpp-icon-more direction="horizontal" class="icon-more"></wpp-icon-more>
        <wpp-avatar
          name="Avatar"
          size="s"
          color="var(--wpp-dataviz-color-cat-dark-1)"
        ></wpp-avatar>
      </div>
    </div>
    <wpp-divider></wpp-divider>
    <wpp-topbar
      [value]="value"
      [navigation]="topbarItems"
      (wppChange)="handleTopbarItemChange($event)"
    >
      <div slot="app" class="app">
        <wpp-typography class="name" type="m-strong" tag="h3">
          APP Name
        </wpp-typography>
      </div>
    </wpp-topbar>
  </div>
  <div class="container">
    <div class="nav-sidebar">
      <wpp-nav-sidebar class="sidebar" initialPath="/dashboard">
        <div slot="header">
          <div class="icon">
            <wpp-icon-bookmark-selected></wpp-icon-bookmark-selected>
          </div>
          <p class="appName">App Name</p>
        </div>
        <wpp-nav-sidebar-item label="Dashboard" path="/dashboard">
          <wpp-icon-globe slot="icon-start"></wpp-icon-globe>
        </wpp-nav-sidebar-item>
        <wpp-nav-sidebar-item
          label="Projects"
          path="/projects"
          extended
          expanded
        >
          <wpp-icon-favourites slot="icon-start"></wpp-icon-favourites>
          <wpp-nav-sidebar-item
            label="Projects 01"
            path="/projects1"
          ></wpp-nav-sidebar-item>
          <wpp-nav-sidebar-item
            label="Projects 02"
            path="/projects2"
          ></wpp-nav-sidebar-item>
          <wpp-nav-sidebar-item
            label="Projects 03"
            path="/projects3"
          ></wpp-nav-sidebar-item>
        </wpp-nav-sidebar-item>
        <wpp-nav-sidebar-item
          label="Scheduled reporting"
          path="/scheduled"
          extended
          group-title="Reporting"
        >
          <wpp-icon-calendar slot="icon-start"></wpp-icon-calendar>
          <wpp-nav-sidebar-item
            label="Scheduled 01"
            path="/scheduled1"
          ></wpp-nav-sidebar-item>
          <wpp-nav-sidebar-item
            label="Scheduled 02"
            path="/scheduled2"
          ></wpp-nav-sidebar-item>
        </wpp-nav-sidebar-item>
        <wpp-nav-sidebar-item
          label="Shared reports"
          path="/shared-reposts"
          divide
        >
          <wpp-icon-user slot="icon-start"></wpp-icon-user>
        </wpp-nav-sidebar-item>
        <wpp-nav-sidebar-item label="Attachments" path="/attachments">
          <wpp-icon-mail slot="icon-start"></wpp-icon-mail>
        </wpp-nav-sidebar-item>
        <wpp-nav-sidebar-item label="Archive" path="/archive" divide>
          <wpp-icon-subscribe slot="icon-start"></wpp-icon-subscribe>
        </wpp-nav-sidebar-item>
        <wpp-nav-sidebar-item label="Applications" path="/applications">
          <wpp-icon-upload slot="icon-start"></wpp-icon-upload>
        </wpp-nav-sidebar-item>
      </wpp-nav-sidebar>
    </div>
    <div class="container-body">
      <wpp-banner type="warning" [show]="isToShowBanner" class="banner">
        USPS has updated their rates. Make sure you know how these changes
        affect your store.
      </wpp-banner>

      <div class="body">
        <div class="section">
          <div class="section-info">
            <wpp-typography type="3xl-heading">Client images</wpp-typography>
            <div class="actions-row">
              <wpp-icon-help color="var(--wpp-brand-color)"></wpp-icon-help>
              <wpp-typography type="s-midi" class="helper">
                Help
              </wpp-typography>
              <wpp-button variant="secondary" (click)="handleShowBanner()" data-testid="show-banner">
                Show Banner
              </wpp-button>
              <wpp-button
                variant="primary"
                class="export-btn"
                (click)="handleCloseBanner()"
              >
                Close Banner
              </wpp-button>
            </div>
          </div>
          <div class="cards-list">
            <wpp-card
              *ngFor="let card of cards"
              [key]="card.title"
              class="card-item"
            >
              <img [src]="card.src" alt="" />
              <div class="content">
                <wpp-typography type="xl-heading" class="title">
                  {{ card.title }}
                </wpp-typography>
                <wpp-typography type="s-body" class="description">
                  {{ card.description }}
                </wpp-typography>
              </div>
            </wpp-card>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
