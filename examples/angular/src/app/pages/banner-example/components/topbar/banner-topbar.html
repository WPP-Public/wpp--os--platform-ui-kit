<div class="page">
  <div class="header">
    <div class="navigation">
      <div class="navigation-bar">
        <wpp-icon-navigation-menu class="icon-nav-menu"></wpp-icon-navigation-menu>
        <img
          src="https://easydrawingguides.com/wp-content/uploads/2018/09/Impossible-Triangle-09.png"
          class="image"
          alt=""
        />
        <wpp-breadcrumb [items]="breadcrumbItems"></wpp-breadcrumb>
      </div>
      <div class="actions-row">
        <wpp-icon-search class="icon-search"></wpp-icon-search>
        <wpp-typography type="s-midi">Help</wpp-typography>
        <wpp-icon-more direction="horizontal" class="icon-more"></wpp-icon-more>
        <wpp-avatar name="Avatar" size="s" color="var(--wpp-dataviz-color-cat-dark-9)"></wpp-avatar>
      </div>
    </div>
    <wpp-divider></wpp-divider>
    <wpp-topbar [value]="value" [navigation]="topbarItems" (wppChange)="handleTopbarItemChange($event)">
      <div slot="app" class="app">
        <wpp-typography class="name" type="m-strong" tag="h3"> APP Name </wpp-typography>
      </div>
    </wpp-topbar>
  </div>
  <div class="container">
    <wpp-banner
      type="information"
      [show]="isToShowBanner"
      closable
      class="banner"
      (wppClose)="handleBannerShowStateChange($event)"
      data-testid="banner-with-top-bar"
    >
      Banners should be used thoughtfully for only the most important information and can contain maximum 1 line of
      text.
    </wpp-banner>
    <div class="body">
      <div class="section">
        <wpp-typography type="3xl-heading">Client images</wpp-typography>
        <div class="actions-row">
          <wpp-icon-help color="var(--wpp-brand-color)"></wpp-icon-help>
          <wpp-typography type="s-midi" class="helper"> Help </wpp-typography>
          <wpp-button variant="secondary" (click)="handleShowBanner()"> Show Banner </wpp-button>
          <wpp-button variant="primary" class="export-btn" (click)="handleCloseBanner()"> Close Banner </wpp-button>
        </div>
      </div>
      <div class="cards-list">
        <wpp-card *ngFor="let card of cards" [key]="card.title" class="card-item">
          <img [src]="card.src" alt="" />
          <div class="content">
            <wpp-typography type="xl-heading" class="title"> {{ card.title }} </wpp-typography>
            <wpp-typography type="s-body" class="description"> {{ card.description }} </wpp-typography>
          </div>
        </wpp-card>
      </div>
    </div>
  </div>
</div>
