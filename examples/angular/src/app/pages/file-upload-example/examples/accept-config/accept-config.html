<div class="container">
  <h3 class="text">File Upload with provided accept config</h3>
  <pre>
       <p>acceptConfig=</p>
    {{acceptPNGandHTM | json }}
      </pre>
  <wpp-file-upload
    [value]='file'
    (wppChange)='handleFileUploadChange($event)'
    data-testid="file-upload-multiple"
    size='1'
    [acceptConfig]='acceptPNGandHTM'
  ></wpp-file-upload>
</div>
