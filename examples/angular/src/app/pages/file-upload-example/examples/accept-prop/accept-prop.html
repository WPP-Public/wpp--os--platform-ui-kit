<div class="container">
  <h3 class="text">File Upload with provided accept prop</h3>
  <pre>accept=['.png']</pre>
  <wpp-file-upload
    [value]='file'
    (wppChange)='handleFileUploadChange($event)'
    data-testid="file-upload-multiple"
    size='1'
    [accept]='formatPNG'
  ></wpp-file-upload>
</div>
