<div class="tags">
  <div>
    <h3>With Variants</h3>
    <wpp-tag class="item" label="Neutral" variant="neutral"></wpp-tag>

    <wpp-tag class="item" label="Warning" variant="warning"></wpp-tag>

    <wpp-tag class="item" label="Positive" variant="positive"></wpp-tag>

    <wpp-tag class="item" label="Negative" variant="negative"></wpp-tag>
  </div>

  <div>
    <h3>With Icons</h3>
    <wpp-tag class="item" label="Neutral" variant="neutral" with-icon>
      <wpp-icon-ask slot="icon-start"></wpp-icon-ask>
    </wpp-tag>

    <wpp-tag class="item" label="Warning" variant="warning" with-icon>
      <wpp-icon-search slot="icon-start"></wpp-icon-search>
    </wpp-tag>

    <wpp-tag class="item" label="Positive" variant="positive" with-icon>
      <wpp-icon-plus slot="icon-start"></wpp-icon-plus>
    </wpp-tag>

    <wpp-tag class="item" label="Negative" variant="negative" with-icon>
      <wpp-icon-drag slot="icon-start"></wpp-icon-drag>
    </wpp-tag>
  </div>

  <div>
    <h3>With categoricalColorIndex</h3>

    <wpp-tag class="item" label="Color Index 1" variant="Cat-1"></wpp-tag>
    <wpp-tag class="item" label="Color Index 2" variant="Cat-2"></wpp-tag>
    <wpp-tag class="item" label="Color Index 3" variant="Cat-3"></wpp-tag>
    <wpp-tag class="item" label="Color Index 4" variant="Cat-4"></wpp-tag>
    <wpp-tag class="item" label="Color Index 5" variant="Cat-5"></wpp-tag>
    <wpp-tag class="item" label="Color Index 6" variant="Cat-6"></wpp-tag>
    <wpp-tag class="item" label="Color Index 7" variant="Cat-7"></wpp-tag>
    <wpp-tag class="item" label="Color Index 8" variant="Cat-8"></wpp-tag>
    <wpp-tag class="item" label="Color Index 9" variant="Cat-9"></wpp-tag>
  </div>

  <div>
    <h3>With truncation</h3>
    <wpp-tag class="item" label="Truncation" variant="warning" max-label-length="5"></wpp-tag>
  </div>
</div>
