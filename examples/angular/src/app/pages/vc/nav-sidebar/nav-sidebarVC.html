<div class="wrapper open">
  <div class="control-panel">
    <wpp-typography type="m-strong">Control Active Path</wpp-typography>
    <button (click)="setActivePath('/dashboard')">Go to Dashboard</button>
    <button (click)="setActivePath('/projects')">Go to Projects</button>
    <button (click)="setActivePath('/scheduled')">Go to Scheduled Reporting</button>
    <button (click)="setActivePath('/shared-reports')">Go to Shared Reports</button>
  </div>

  <wpp-nav-sidebar
    [activePath]="activePath"
    (wppChange)="handleChangeRoute($event)"
    [nativeLink]="true"
  >
    <div slot="header">
      <div class="icon">
        <wpp-icon-bookmark-selected></wpp-icon-bookmark-selected>
      </div>
      <wpp-typography type="m-strong" class="name" tag="p">
        App Name
      </wpp-typography>
    </div>
    <wpp-nav-sidebar-item label="Dashboard" path="/dashboard" target="_blank">
      <wpp-icon-globe slot="icon-start"></wpp-icon-globe>
    </wpp-nav-sidebar-item>
    <wpp-nav-sidebar-item label="Projects" path="/projects" extended expanded>
      <wpp-icon-favourites slot="icon-start"></wpp-icon-favourites>
      <wpp-nav-sidebar-item
        label="Projects 01"
        path="/projects1"
        target="_blank"
      ></wpp-nav-sidebar-item>
      <wpp-nav-sidebar-item
        label="Projects 02"
        path="/projects2"
        target="_blank"
      ></wpp-nav-sidebar-item>
      <wpp-nav-sidebar-item
        label="Projects 03"
        path="/projects3"
        target="_blank"
      ></wpp-nav-sidebar-item>
    </wpp-nav-sidebar-item>
    <wpp-nav-sidebar-item
      label="Scheduled reporting"
      path="/scheduled"
      extended
      group-title="Reporting"
      data-testid="tooltip-item"
    >
      <wpp-icon-calendar slot="icon-start"></wpp-icon-calendar>
      <wpp-nav-sidebar-item
        label="Scheduled 01"
        path="/scheduled1"
      ></wpp-nav-sidebar-item>
      <wpp-nav-sidebar-item
        label="Scheduled 02"
        path="/scheduled2"
      ></wpp-nav-sidebar-item>
    </wpp-nav-sidebar-item>
    <wpp-nav-sidebar-item label="Shared reports" path="/shared-reports" divide>
      <wpp-icon-user slot="icon-start"></wpp-icon-user>
    </wpp-nav-sidebar-item>
    <wpp-nav-sidebar-item label="Attachments" path="/attachments">
      <wpp-icon-mail slot="icon-start"></wpp-icon-mail>
    </wpp-nav-sidebar-item>
    <wpp-nav-sidebar-item label="Archive" path="/archive" divide>
      <wpp-icon-subscribe slot="icon-start"></wpp-icon-subscribe>
    </wpp-nav-sidebar-item>
    <wpp-nav-sidebar-item label="Applications" path="/applications">
      <wpp-icon-upload slot="icon-start"></wpp-icon-upload>
    </wpp-nav-sidebar-item>
  </wpp-nav-sidebar>
  <div>
    <wpp-typography type="m-body" tag="p">
        Content Area: The content updates based on the active item.
      </wpp-typography>
  </div>
</div>
