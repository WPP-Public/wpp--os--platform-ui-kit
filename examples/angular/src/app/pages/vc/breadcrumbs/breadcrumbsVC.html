<div class="breadcrumbs" data-testid="breadcrumbs">
  <div>
    <h3>Regular Breadcrumb</h3>
    <wpp-breadcrumb [items]="items" (wppChange)="handleRouteChange($event)"
                    data-testid="without-native-link"></wpp-breadcrumb>
  </div>

  <div>
    <h3>Breadcrumb with 3 elements</h3>
    <wpp-breadcrumb [items]="items.slice(0, 3)" native-link data-testid="with-native-link"></wpp-breadcrumb>
  </div>

  <div>
    <h3>Breadcrumb with 4 elements</h3>
    <wpp-breadcrumb [items]="items.slice(0, 4)"></wpp-breadcrumb>
  </div>

  <div>
    <h3>Breadcrumb with 5 elements</h3>
    <wpp-breadcrumb [items]="items.slice(0, 5)"></wpp-breadcrumb>
  </div>

  <div>
    <h3>Breadcrumb with middleTruncation</h3>
    <wpp-breadcrumb
      [items]='items'
      middle-truncation
      (wppChange)="handleRouteChange($event)"
      data-testid="breadcrumb-truncation"></wpp-breadcrumb>
  </div>
</div>
