<div class="container" data-testid="labels-container">
  <div class="labels">
    <h3>Regular Labels</h3>
    <wpp-label class="label" [config]="{ text: 'Regular Label' }" ></wpp-label>

    <wpp-label
      class="label"
      disabled
      [config]="{ text: 'Disabled Regular Label' }"
    ></wpp-label>

    <wpp-label
      class="label"
      optional
      [config]="{ text: 'Optional Regular Label' }"
    ></wpp-label>

    <wpp-label
      class="label"
      html-for="email"
      [config]="{ text: 'Regular Label with html-for' }"
    ></wpp-label>

    <wpp-label
      class="label"
      html-for="fname"
      optional
      disabled
      [config]="{ text: 'All In Regular Label' }"
    ></wpp-label>

    <wpp-label
      class="label"
      [config]="regularLabelConfig"
      [tooltipConfig]="{ placement: 'right' }"
    ></wpp-label>

    <wpp-label [config]="{ text: 'Default Label' }" data-testid="default-label"></wpp-label>
  </div>

  <div class="accent-labels">
    <h3>Accent Labels</h3>
    <wpp-label
      class="label"
      [config]="{ text: 'Accent Label' }"
      typography="s-strong"
    ></wpp-label>

    <wpp-label
      class="label"
      disabled
      typography="s-strong"
      [config]="{ text: 'Disabled Accent Label' }"
    ></wpp-label>

    <wpp-label
      class="label"
      optional
      typography="s-strong"
      [config]="{ text: 'Optional Accent Label' }"
    ></wpp-label>

    <wpp-label
      class="label"
      html-for="email"
      typography="s-strong"
      [config]="{ text: 'Accent Label with html-for' }"
    ></wpp-label>

    <wpp-label
      class="label"
      html-for="fname"
      optional
      disabled
      typography="s-strong"
      [config]="{ text: 'All In Accent Label' }"
    ></wpp-label>

    <wpp-label
      class="label"
      typography="s-strong"
      [config]="accentedLabelConfig"
      [tooltipConfig]="{ placement: 'left' }"
      data-testid="tooltip-label"
    ></wpp-label>
  </div>
</div>
