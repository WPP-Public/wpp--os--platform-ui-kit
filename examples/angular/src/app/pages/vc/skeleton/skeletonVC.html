<div class="container">
  <h2>Skeleton Examples</h2>

  <!-- Card Skeleton Example -->
  <section>
    <h3>Card Skeleton</h3>
    <div class="cardSkeleton">
      <wpp-skeleton width="60%" height="30px" style="margin-bottom: 16px;"></wpp-skeleton>
      <wpp-skeleton width="90%" height="16px" style="margin-bottom: 8px;"></wpp-skeleton>
      <wpp-skeleton width="80%" height="16px" style="margin-bottom: 24px;"></wpp-skeleton>
      <div class="skeletonRow">
        <wpp-skeleton width="70%" height="8px"></wpp-skeleton>
        <wpp-skeleton width="30%" height="8px"></wpp-skeleton>
      </div>
    </div>
  </section>

  <!-- Card Skeleton Example - Animation Off -->
  <section>
    <h3>Card Skeleton - Animation Off</h3>
    <div class="cardSkeleton">
      <wpp-skeleton [animation]="false" width="60%" height="30px" style="margin-bottom: 16px;"></wpp-skeleton>
      <wpp-skeleton [animation]="false" width="90%" height="16px" style="margin-bottom: 8px;"></wpp-skeleton>
      <wpp-skeleton [animation]="false" width="80%" height="16px" style="margin-bottom: 24px;"></wpp-skeleton>
      <div class="skeletonRow">
        <wpp-skeleton [animation]="false" width="70%" height="8px"></wpp-skeleton>
        <wpp-skeleton [animation]="false" width="30%" height="8px"></wpp-skeleton>
      </div>
    </div>
  </section>

  <!-- Table Skeleton Example -->
  <section>
    <h3>Table Skeleton</h3>
    <div class="tableSkeleton">
      <div class="row">
        <wpp-skeleton *ngFor="let header of [].constructor(6)" width="100%" height="20px"></wpp-skeleton>
      </div>
      <div *ngFor="let row of [].constructor(5)" class="row">
        <wpp-skeleton *ngFor="let col of [].constructor(6)" width="100%" height="16px"></wpp-skeleton>
      </div>
    </div>
  </section>
<!-- Custom Layout Example -->
<section>
  <h3>Custom Layout</h3>
  <div class="customLayout">
    <wpp-skeleton variant="circle" width="50px" height="50px"></wpp-skeleton>
    <div class="customLayoutText">
      <wpp-skeleton width="80%" height="20px" style="margin-bottom: 8px;"></wpp-skeleton>
      <wpp-skeleton width="60%" height="16px"></wpp-skeleton>
    </div>
  </div>
</section>
</div>
