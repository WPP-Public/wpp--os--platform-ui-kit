<div>
  <div class="toastBtnsWrapper">
  <wpp-button variant="secondary" (click)="handleAddToast()" data-testid="add-toast-button">
    Add Toast
  </wpp-button>

    <wpp-button variant="secondary" (click)="handleAddCustomToast()" data-testid="add-toast-with-custom-icon-button">
      Add Toast with custom icon
    </wpp-button>

    <wpp-button
      variant="secondary"
      (click)="handleAddToastWithLongText()"
      data-testid="add-toast-with-long-text-button"
    >
      Add Toast with long text
    </wpp-button>
  </div>
  <wpp-toast-container #container [maxToastsToDisplay]="5"></wpp-toast-container>

  <div class="toasts-container">
    <h3>Chat Input Message Toasts</h3>
    <div class="chatItems">
      <wpp-toast class="chatItem" message="Error" type="error" variant="chat" [duration]="600000"></wpp-toast>
      <wpp-toast class="chatItem" message="Success" type="success" variant="chat" [duration]="600000"></wpp-toast>
      <wpp-toast class="chatItem" message="Information" type="information" variant="chat" [duration]="600000"></wpp-toast>
    </div>

    <div class="items">
      <h3>Default Message Toasts</h3>
      <wpp-toast
        class="item"
        header="Error Header Text"
        message="Error Message Text"
        type="error"
        duration="60000"
      ></wpp-toast>

      <wpp-toast
        class="item"
        header="Warning Header Text"
        message="Warning Message Text"
        type="warning"
        duration="60000"
      ></wpp-toast>

      <wpp-toast
        class="item"
        header="Info Header"
        message="Info Message Text"
        type="information"
        duration="60000"
      ></wpp-toast>

      <wpp-toast
        class="item withMargin"
        header="Success Header Text"
        message="Success Message Text"
        type="success"
        duration="60000"
      ></wpp-toast>

      <wpp-toast
        class="item"
        message="Text without header"
        type="error"
        duration="60000"
      ></wpp-toast>

      <wpp-toast
        class="item"
        header="Header text without message text"
        message=""
        type="warning"
        duration="60000"
      ></wpp-toast>

      <wpp-toast
        class="item"
        header="Very long header message Very long header message Very long header message Very long header message "
        message="Very long message Very long message Very long message Very long message Very long message Very long message "
        type="information"
        duration="60000"
      ></wpp-toast>

      <wpp-toast
        class="item"
        message="Very long message Very long message Very long message Very long message Very long message Very long message "
        type="information"
        duration="60000"
      ></wpp-toast>
    </div>

    <div class="items">
      <h3>Message Toasts with Action Button</h3>
      <wpp-toast
        class="item"
        header="Error Header Text"
        message="Error Message Text"
        type="error"
        [primaryBtn]="primaryButton"
        duration="60000"
      ></wpp-toast>

      <wpp-toast
        class="item"
        header="Warning Header Text"
        message="Warning Message Text"
        type="warning"
        [primaryBtn]="primaryButton"
        duration="60000"
      ></wpp-toast>

      <wpp-toast
        class="item"
        header="Info Header"
        message="Info Message Text"
        type="information"
        [primaryBtn]="primaryButton"
        duration="60000"
      ></wpp-toast>

      <wpp-toast
        class="item withMargin"
        header="Success Header Text"
        message="Success Message Text"
        type="success"
        [primaryBtn]="primaryButton"
        duration="60000"
      ></wpp-toast>

      <wpp-toast
        class="item"
        message="Text without header"
        type="error"
        [primaryBtn]="primaryButton"
        duration="60000"
      ></wpp-toast>

      <wpp-toast
        class="item"
        header="Header text without message text"
        message=""
        type="warning"
        [primaryBtn]="primaryButton"
        duration="60000"
      ></wpp-toast>

      <wpp-toast
        class="item"
        header="Very long header message Very long header message Very long header message Very long header message "
        message="Very long message Very long message Very long message Very long message Very long message Very long message "
        type="information"
        [primaryBtn]="primaryButton"
        duration="60000"
      ></wpp-toast>

      <wpp-toast
        class="item"
        message="Very long message Very long message Very long message Very long message Very long message Very long message "
        type="information"
        [primaryBtn]="primaryButton"
        duration="60000"
      ></wpp-toast>
    </div>
  </div>
</div>
