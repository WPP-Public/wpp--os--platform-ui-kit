<html>
<head>
  <link rel="stylesheet" href="https://public-assets.os.wpp.com/flags/minified.css"/>
</head>
<div data-testid="countries-container">
  <div class="row" *ngFor="let group of handleFlagsGrouping()">
    <div class="row" *ngFor="let flag of group">
      <div class="flag">
        <p class="label">{{flag.title}}</p>
        <div class="flags" [class]="flag.icon"></div>
      </div>
    </div>
  </div>
</div>
</html>
