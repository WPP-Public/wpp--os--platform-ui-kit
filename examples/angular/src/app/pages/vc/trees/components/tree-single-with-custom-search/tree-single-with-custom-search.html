<h3 class="title">
  Single tree with custom search: tree-item's text should match exactly the search string (is case sensitive)
</h3>

<wpp-input class="search" type="search" placeholder="Search" (wppChange)="debouncedHandleSearch($event)"></wpp-input>

<wpp-tree
  class="tree"
  [data]="treeData"
  [search]="search"
  [searchConfig]="searchConfig"
  (wppChange)="handleTreeChange($event)"
  data-testid="single-tree-custom-search"
></wpp-tree>
