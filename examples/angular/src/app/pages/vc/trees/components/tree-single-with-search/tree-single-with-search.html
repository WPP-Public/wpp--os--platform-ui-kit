<h3 class="title">Single tree with search</h3>

<wpp-input
  class="search"
  type="search"
  placeholder="Search"
  (wppChange)="debouncedHandleSearch($event)"
  data-testid="search-input"
></wpp-input>

<wpp-tree
  class="tree"
  [data]="treeData"
  [search]="search"
  (wppChange)="handleTreeChange($event)"
  (wppActionClick)="handleActionClick($event)"
></wpp-tree>
