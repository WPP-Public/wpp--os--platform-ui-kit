<h3 class="title">Multiple tree with search</h3>

<wpp-input
  class="search"
  type="search"
  placeholder="Search"
  (wppChange)="debouncedHandleSearch($event)"
></wpp-input>

<wpp-tree
  class="tree"
  [data]="treeData"
  [search]="search"
  multiple
  (wppChange)="handleTreeChange($event)"
  data-testid="multiple-tree"
></wpp-tree>
