<div data-testid="skeleton-tree-container">
  <h3 class="title">Single tree</h3>
  <wpp-tree
    class="tree"
    [data]="treeData"
    (wppChange)="handleTreeChange($event)"
    (wppActionClick)="handleActionClick($event)"
    data-testid="single-tree"
    [loading]="loading"
    skeleton-number-items="3"
  ></wpp-tree>

  <wpp-button (click)="toggleLoading()">Toggle Loading</wpp-button>
</div>
