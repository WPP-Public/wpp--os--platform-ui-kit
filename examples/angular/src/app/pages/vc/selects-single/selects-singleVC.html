<div>
  <h2>Single Selects</h2>
  <div class="section selects" data-testid="single-selects">
    <div class="size">
      <h3>M Size</h3>
      <wpp-select
        name="wpp-select"
        size="m"
        placeholder="Choose option"
        class="item"
        required
        [labelConfig]="getLabelConfig('Regular Single')"
      ></wpp-select>

      <wpp-select
        size="m"
        class="item"
        placeholder="Choose option"
        required
        [labelConfig]="getLabelConfig('Disabled Regular Single Select')"
        disabled
      ></wpp-select>

      <wpp-select
        size="m"
        placeholder="Choose option"
        class="item"
        required
        [labelConfig]="getLabelConfig('Info Single Select')"
        message="Info message"
      ></wpp-select>

      <wpp-select
        size="m"
        placeholder="Choose option"
        class="item"
        required
        [labelConfig]="getLabelConfig('Warning Single Select')"
        message="Warning message"
        message-type="warning"
      ></wpp-select>

      <wpp-select
        size="m"
        placeholder="Choose option"
        class="item"
        required
        [labelConfig]="getLabelConfig('Error Single Select')"
        message="Error message"
        message-type="error"
      ></wpp-select>

      <wpp-select
        size="m"
        placeholder="Choose option"
        class="item"
        required
        [labelConfig]="getLabelConfig('Info Single Select with max message length')"
        [message]="message"
        [maxMessageLength]="50"
      ></wpp-select>

      <wpp-select
        size="m"
        placeholder="Choose option"
        class="item"
        required
        [labelConfig]="getLabelConfig('Warning Single Select with max message length')"
        [message]="message"
        message-type="warning"
        [maxMessageLength]="50"
      ></wpp-select>

      <wpp-select
        size="m"
        placeholder="Choose option"
        class="item"
        required
        [labelConfig]="getLabelConfig('Error Single Select with max message length')"
        [message]="message"
        message-type="error"
        [maxMessageLength]="50"
      ></wpp-select>

      <wpp-select
        size="m"
        placeholder="Choose option"
        class="item"
        required
        [labelConfig]="getLabelConfig('Disabled Info Single Select')"
        message="Info message"
        disabled
      ></wpp-select>

      <wpp-select
        size="m"
        placeholder="Choose option"
        class="item"
        required
        [labelConfig]="getLabelConfig('Disabled Warning Single Select')"
        message="Warning message"
        message-type="warning"
        disabled
      ></wpp-select>

      <wpp-select
        size="m"
        placeholder="Choose option"
        class="item"
        required
        [labelConfig]="getLabelConfig('Disabled Error Single Select')"
        message="Error message"
        message-type="error"
        disabled
      ></wpp-select>

      <wpp-select
        size="m"
        placeholder="Choose option"
        class="item"
        [labelConfig]="getLabelConfig('Optional Single Select')"
      ></wpp-select>

      <wpp-typography type="s-body">Text Select without Label (required)</wpp-typography>

      <wpp-select size="m" placeholder="Choose option" class="item" required></wpp-select>
    </div>

    <div class="size">
      <h3>S Size</h3>
      <wpp-select
        name="wpp-select"
        size="s"
        placeholder="Choose option"
        class="item"
        required
        [labelConfig]="getLabelConfig('Regular Single Select')"
        [list]="LIST"
        (wppChange)="handleChangeSelect($event)"
        [value]="selectValue"
      >
      </wpp-select>

      <wpp-select
        size="s"
        placeholder="Choose option"
        class="item"
        required
        [labelConfig]="getLabelConfig('Disabled Regular Single Select')"
        disabled
      ></wpp-select>

      <wpp-select
        size="s"
        placeholder="Choose option"
        class="item"
        required
        [labelConfig]="getLabelConfig('Info Single Select')"
        message="Info message"
      ></wpp-select>

      <wpp-select
        size="s"
        placeholder="Choose option"
        class="item"
        required
        [labelConfig]="getLabelConfig('Warning Single Select')"
        message="Warning message"
        message-type="warning"
      ></wpp-select>

      <wpp-select
        size="s"
        placeholder="Choose option"
        class="item"
        required
        [labelConfig]="getLabelConfig('Error Single Select')"
        message="Error message"
        message-type="error"
      ></wpp-select>

      <wpp-select
        size="s"
        placeholder="Choose option"
        class="item"
        required
        [labelConfig]="getLabelConfig('Info Single Select with max message length')"
        [message]="message"
        [maxMessageLength]="50"
      ></wpp-select>

      <wpp-select
        size="s"
        placeholder="Choose option"
        class="item"
        required
        [labelConfig]="getLabelConfig('Warning Single Select with max message length')"
        [message]="message"
        message-type="warning"
        [maxMessageLength]="50"
      ></wpp-select>

      <wpp-select
        size="s"
        placeholder="Choose option"
        class="item"
        required
        [labelConfig]="getLabelConfig('Error Single Select with max message length')"
        [message]="message"
        message-type="error"
        [maxMessageLength]="50"
      ></wpp-select>

      <wpp-select
        size="s"
        placeholder="Choose option"
        class="item"
        required
        [labelConfig]="getLabelConfig('Disabled Info Single Select')"
        message="Info message"
        disabled
      ></wpp-select>

      <wpp-select
        size="s"
        placeholder="Choose option"
        class="item"
        required
        [labelConfig]="getLabelConfig('Disabled Warning Single Select')"
        message="Warning message"
        message-type="warning"
        disabled
      ></wpp-select>

      <wpp-select
        size="s"
        placeholder="Choose option"
        class="item"
        required
        [labelConfig]="getLabelConfig('Disabled Error Single Select')"
        message="Error message"
        message-type="error"
        disabled
      ></wpp-select>

      <wpp-select
        size="s"
        placeholder="Choose option"
        class="item"
        [labelConfig]="getLabelConfig('Optional Single Select')"
      ></wpp-select>

      <wpp-typography type="s-body">Text Select without Label (required)</wpp-typography>

      <wpp-select size="s" placeholder="Choose option" class="item" required></wpp-select>
      <wpp-select
        name="wpp-select"
        size="s"
        placeholder="Choose option"
        class="item"
        required
        [labelConfig]="getLabelConfig('Single Select with Avatars and Subtitles')"
        [list]="CUSTOM_LIST"
        (wppChange)="handleChangeCustom($event)"
        [value]="customValue"
      >
      </wpp-select>
    </div>

    <div class="expanded">
      <h3>Select With Left Icon</h3>
      <wpp-select
        size="m"
        placeholder="Choose option"
        class="item"
        required
        [labelConfig]="selectWithItemsLabelConfig"
        data-testid="select-with-items"
        [list]="LIST"
        (wppChange)="handleChangeSelect($event)"
        [value]="selectValue"
      >
        <wpp-icon-clock slot="icon-start"></wpp-icon-clock>
      </wpp-select>
    </div>
  </div>
</div>
