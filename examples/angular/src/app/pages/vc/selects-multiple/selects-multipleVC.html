<div>
  <div class="section multiple" data-testid="multiple-selects">
    <h2>Multiple Selects</h2>

    <div class="select">
      <wpp-select
        name="wpp-multiple-select"
        type="multiple"
        size="m"
        placeholder="Choose options"
        class="item"
        required
        [value]="selectValue"
        (wppChange)="handleSelectChange($event)"
        [labelConfig]="getLabelConfig('Regular Multiple Select with left Icon')"
        [list]="LIST"
      >
      </wpp-select>

      <wpp-select
        name="wpp-multiple-select"
        type="multiple"
        size="m"
        placeholder="Choose options"
        class="item"
        required
        [value]="selectValue"
        with-folder
        [labelConfig]="getLabelConfig('Multiple Select with folder')"
        data-testid="multiple-select-with-folder"
        [showSelectAllText]="false"
        (wppChange)="handleSelectChange($event)"
        [list]="LIST"
      >
      </wpp-select>

      <div class="multipleContainer" data-testid="multiple-select-container">
        <wpp-select
          name="wpp-multiple-select"
          type="multiple"
          size="m"
          placeholder="Choose options"
          class="item"
          required
          [value]="selectValue"
          with-folder
          with-search
          [labelConfig]="getLabelConfig('Multiple Select with search')"
          data-testid="search-and-folder-multiple-select"
          [list]="LIST"
          (wppChange)="handleSelectChange($event)"
        >
        </wpp-select>
      </div>
    </div>
  </div>
</div>
