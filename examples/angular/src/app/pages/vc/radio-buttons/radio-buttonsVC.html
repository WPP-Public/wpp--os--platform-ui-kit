<div class="control-bars">
  <div class="radioButtons">
    <h3>With Label</h3>
    <wpp-radio
      name="wpp-radio-1"
      class="item"
      [labelConfig]="getLabelConfig('Option 1' )"
      required
      auto-focus
      data-testid="focus-radio-button"
    ></wpp-radio>

    <wpp-radio
      name="wpp-radio-2"
      class="item"
      [labelConfig]="labelConfig"
      required
    ></wpp-radio>

    <wpp-radio class="item" [labelConfig]="getLabelConfig('Option 1' )" ></wpp-radio>

    <wpp-radio
      name="wpp-radio-3"
      class="item"
      [labelConfig]="getLabelConfig('Option 1' )"
      disabled
      required
    ></wpp-radio>

    <wpp-radio
      name="wpp-radio-4"
      class="item"
      [labelConfig]="getLabelConfig('Option 1' )"
      checked
      required
    ></wpp-radio>

    <wpp-radio
      name="wpp-radio-5"
      class="item"
      [labelConfig]="getLabelConfig('Option 1' )"
      checked
      disabled
      required
    ></wpp-radio>

    <wpp-radio
      name="wpp-radio-6"
      class="item"
      [labelConfig]="getLabelConfig('Hover test' )"
      data-testid="hover-radio-button"
      required
    ></wpp-radio>

    <h3>Without Label</h3>
    <wpp-radio class="item" required ></wpp-radio>

    <wpp-radio class="item" ></wpp-radio>

    <wpp-radio class="item" disabled required ></wpp-radio>

    <wpp-radio class="item" checked required ></wpp-radio>

    <wpp-radio class="item" checked disabled required ></wpp-radio>
  </div>
</div>
