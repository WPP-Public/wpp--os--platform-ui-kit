<div>
  <div class="section text" data-testid="text-selects">
    <h2>Text Selects</h2>
    <wpp-typography type="s-body" class="label"> Regular Text Select </wpp-typography>
    <wpp-select
      type="text"
      (wppChange)="handleChange1($event)"
      placeholder="Placeholder"
      [list]="LIST_1"
      [value]="selectValue1"
    >
    </wpp-select>

    <wpp-typography type="s-body" class="label"> Disabled Text Select </wpp-typography>
    <wpp-select type="text" placeholder="Choose an Option" disabled></wpp-select>

    <wpp-typography type="s-body" class="label"> Text Select with Options </wpp-typography>
    <wpp-select
      type="text"
      (wppChange)="handleChange2($event)"
      placeholder="Placeholder"
      [list]="LIST_2"
      [value]="selectValue2"
      data-testid="text-select-with-items"
    >
    </wpp-select>

    <wpp-typography type="s-body" class="label"> Text Select with Auto Focus </wpp-typography>
    <wpp-select
      type="text"
      (wppChange)="handleChange3($event)"
      placeholder="Placeholder"
      [list]="LIST_3"
      [value]="selectValue3"
      data-testid="focus-text-select"
      auto-focus
    >
    </wpp-select>
  </div>
</div>
