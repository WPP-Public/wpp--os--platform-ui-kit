<div>
  <div class="container" data-testid="paginations">
    <div>
      <h3>Pagination Select</h3>
      <wpp-pagination-select
        class="item"
        count="8"
        active-page-number="1"
        page-select-threshold="5"
      ></wpp-pagination-select>

      <wpp-pagination-select
        class="item"
        count="8"
        active-page-number="4"
        page-select-threshold="5"
      ></wpp-pagination-select>

      <wpp-pagination-select
        count="8"
        active-page-number="8"
        page-select-threshold="5"
      ></wpp-pagination-select>
    </div>

    <div>
      <h3>
        Pagination Select (pageSelectThreshold exceeds the pages amount)
      </h3>
      <wpp-pagination-select
        class="item"
        count="8"
        active-page-number="1"
        page-select-threshold="11"
      ></wpp-pagination-select>

      <wpp-pagination-select
        class="item"
        count="8"
        active-page-number="5"
        page-select-threshold="11"
      ></wpp-pagination-select>

      <wpp-pagination-select
        count="8"
        active-page-number="8"
        page-select-threshold="11"
      ></wpp-pagination-select>
    </div>

    <div>
      <h3>Pagination</h3>
      <wpp-pagination
        count="8"
        active-page-number="1"
        page-select-threshold="1"
        [itemsPerPage]="itemsPerPageOptions"
      ></wpp-pagination>

      <wpp-pagination
        count="8"
        active-page-number="2"
        page-select-threshold="1"
        [itemsPerPage]="itemsPerPageOptions"
      ></wpp-pagination>

      <wpp-pagination
        count="8"
        active-page-number="3"
        page-select-threshold="1"
        [itemsPerPage]="itemsPerPageOptions"
      ></wpp-pagination>

      <wpp-pagination
        count="8"
        active-page-number="1"
        page-select-threshold="9"
        [itemsPerPage]="itemsPerPageOptions"
      ></wpp-pagination>

      <wpp-pagination
        count="8"
        active-page-number="2"
        page-select-threshold="9"
        [itemsPerPage]="itemsPerPageOptions"
      ></wpp-pagination>

      <wpp-pagination
        count="8"
        active-page-number="3"
        page-select-threshold="9"
        [itemsPerPage]="itemsPerPageOptions"
      ></wpp-pagination>

      <wpp-pagination
        count="8"
        page-select-threshold="1"
        selected-item-per-page="8"
        [itemsPerPage]="itemsPerPageOptions"
      ></wpp-pagination>

      <wpp-pagination
        count="8"
        page-select-threshold="9"
        selected-item-per-page="8"
        [itemsPerPage]="itemsPerPageOptions"
      ></wpp-pagination>

      <wpp-pagination
        count="8"
        active-page-number="1"
        page-select-threshold="9"
        [itemsPerPage]="itemsPerPageOptions"
        data-testid="pagination-list"
      ></wpp-pagination>

      <wpp-card>
        <wpp-pagination
          count="8"
          active-page-number="1"
          page-select-threshold="9"
          [dropdownConfig]="dropdownConfig"
          [itemsPerPage]="itemsPerPageOptions"
          data-testid="pagination-in-card"
        ></wpp-pagination>
      </wpp-card>
    </div>
  </div>
</div>
