<div class="wrapper">
  <wpp-tabs [value]="currentTab" (wppChange)="handleTabChange($event)">
    <wpp-tab value="regularForm">Regular Forms</wpp-tab>
    <wpp-tab value="wizardForm" data-testid="wizard-tab">
      Wizard Form
    </wpp-tab>
  </wpp-tabs>
  <div class="content">
    <form-vanilla-example *ngIf="currentTab === 'regularForm'"></form-vanilla-example>
  </div>
</div>
