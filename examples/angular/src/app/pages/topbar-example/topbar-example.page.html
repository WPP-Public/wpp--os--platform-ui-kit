<div class="page" data-testid="topbar-page">
  <wpp-topbar [value]='value' [navigation]='navigationData' (wppChange)='handleTopbarItemChange($event)'>
    <div slot="app" class="app">
      <img
        src="https://easydrawingguides.com/wp-content/uploads/2018/09/Impossible-Triangle-09.png"
        class="image"
      />
      <wpp-typography class="name" type="m-strong" tag="h3">
        APP Name
      </wpp-typography>
    </div>
  </wpp-topbar>
  <wpp-topbar [value]='value' [navigation]='navigationData'></wpp-topbar>
  <div class="actions">
    <wpp-button variant="secondary" (click)='handleAddNavigationItemToBeginning()' data-testid="add-nav-button">
      Add new navigation to beginning
    </wpp-button>
    <wpp-button variant="secondary" (click)='handleAddNavigationItemToEnd()'>
      Add new navigation to end
    </wpp-button>
  </div>
</div>
